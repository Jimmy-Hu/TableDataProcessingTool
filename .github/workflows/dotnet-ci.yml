name: .NET CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: 'latest'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore TableDataProcessingTool/TableDataProcessingTool.sln

    - name: Build the Solution
      run: msbuild TableDataProcessingTool/TableDataProcessingTool.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Artifact - TableDataProcessingTool
      uses: actions/upload-artifact@v4
      with:
        name: TableDataProcessingTool-Release
        path: TableDataProcessingTool/TableDataProcessingTool/bin/Release/
        if-no-files-found: warn

    - name: Upload Artifact - TableDataProcessingTool2
      uses: actions/upload-artifact@v4
      with:
        name: TableDataProcessingTool2-Release
        path: TableDataProcessingTool/TableDataProcessingTool2/bin/Release/
        if-no-files-found: warn